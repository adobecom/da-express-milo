<!DOCTYPE html>
<html>
  <head>
    <title>DA Block Index</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="data:,">
    <style>
      body { font-family: sans-serif; margin: 1rem 2rem; }
      .back {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        color: #888;
        text-decoration: none;
        font-size: 0.92rem;
        margin-bottom: 1.25rem;
      }
      .back::before { content: '‹'; font-size: 1.5em; line-height: 1; margin-top: -0.06em; }
      .back:hover { color: #000; }
      .toolbar { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
      .meta { color: #888; font-size: 0.9rem; }
      #status { color: #555; min-height: 1.2em; margin-bottom: 0.5rem; }
      #results { margin-top: 0.75rem; }
      details {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        margin: 0.4rem 0;
        background: #fafafa;
      }
      details[open] { background: #fff; }
      summary {
        cursor: pointer;
        font-weight: 600;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      summary::-webkit-details-marker { display: none; }
      summary::after { content: '▸'; color: #aaa; margin-left: 0.5rem; }
      details[open] summary::after { content: '▾'; }
      .block-paths {
        font-family: monospace;
        font-size: 0.82rem;
        margin: 0.5rem 0 0.1rem;
        padding-left: 0.25rem;
        list-style: none;
      }
      .block-paths li { padding: 0.12rem 0; color: #555; }
    </style>
    <script src="https://da.live/nx/utils/sdk.js" type="module"></script>
    <script src="./index.js" type="module"></script>
  </head>
  <body>
    <a href="../" class="back">All Tools</a>
    <h2>Block Index</h2>
    <div class="toolbar">
      <button id="scan-btn">Run Scan</button>
      <span id="last-scanned" class="meta"></span>
    </div>
    <p id="status"></p>
    <p id="block-count" class="meta"></p>
    <div id="results"></div>
  </body>
</html>
