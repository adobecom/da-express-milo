<!DOCTYPE html>
<html>
  <head>
    <title>DA Block Index</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="data:,">
    <style>
      body { font-family: sans-serif; margin: 1rem 2rem; }
      .back {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        color: #888;
        text-decoration: none;
        font-size: 0.92rem;
        margin-bottom: 1.25rem;
      }
      .back::before { content: '‹'; font-size: 1.5em; line-height: 1; margin-top: -0.06em; }
      .back:hover { color: #000; }
      .toolbar { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
      .meta { color: #888; font-size: 0.9rem; }
      #status { color: #555; min-height: 1.2em; margin-bottom: 0.5rem; }
      #legend { display: flex; gap: 1.25rem; font-size: 0.8rem; margin: 0.4rem 0 0.6rem; }
      .legend-express { color: #8a6500; }
      .legend-milo { color: #b03060; }
      .legend-unknown { color: #999; }
      #results { margin-top: 0.25rem; }
      details {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        margin: 0.4rem 0;
        background: #fafafa;
      }
      details[open] { background: #fff; }
      details.repo-express { background: rgba(255, 215, 0, 0.1); border-color: rgba(200, 160, 0, 0.25); }
      details.repo-express[open] { background: rgba(255, 215, 0, 0.16); }
      details.repo-milo { background: rgba(255, 130, 160, 0.08); border-color: rgba(200, 80, 120, 0.2); }
      details.repo-milo[open] { background: rgba(255, 130, 160, 0.14); }
      summary {
        cursor: pointer;
        font-weight: 600;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      summary::-webkit-details-marker { display: none; }
      summary::after { content: '▸'; color: #aaa; margin-left: 0.5rem; flex-shrink: 0; }
      details[open] summary::after { content: '▾'; }
      .summary-left { display: inline-flex; align-items: center; gap: 0.4rem; font-weight: 600; }
      .summary-count { font-weight: 400; color: inherit; }
      .override-badge {
        font-size: 0.7rem;
        font-weight: 500;
        background: rgba(255, 130, 160, 0.25);
        color: #b03060;
        padding: 0.1rem 0.4rem;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .block-paths {
        font-family: monospace;
        font-size: 0.82rem;
        margin: 0.5rem 0 0.1rem;
        padding-left: 0.25rem;
        list-style: none;
      }
      .block-paths li { padding: 0.12rem 0; color: #555; }
      .published-badge { color: #2d9e2d; margin-left: 0.4em; font-size: 0.85em; }
      .published-count { color: #2d9e2d; font-weight: 400; }
    </style>
    <script src="https://da.live/nx/utils/sdk.js" type="module"></script>
    <script src="./index.js" type="module"></script>
  </head>
  <body>
    <a href="../" class="back">All Tools</a>
    <h2>Block Index</h2>
    <div class="toolbar">
      <button id="scan-btn">Run Scan</button>
      <button id="status-btn" style="display:none">Check Status</button>
      <span id="last-scanned" class="meta"></span>
    </div>
    <p id="status"></p>
    <p id="block-count" class="meta"></p>
    <div id="legend"></div>
    <div id="results"></div>
  </body>
</html>
