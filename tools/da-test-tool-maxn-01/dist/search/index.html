<!DOCTYPE html>
<html>
  <head>
    <title>DA Block Finder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="data:,">
    <style>
      body { font-family: sans-serif; margin: 1rem 2rem; }
      .back {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        color: #888;
        text-decoration: none;
        font-size: 0.92rem;
        margin-bottom: 1.25rem;
      }
      .back::before { content: '‹'; font-size: 1.5em; line-height: 1; margin-top: -0.06em; }
      .back:hover { color: #000; }
      form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
      input { flex: 1; padding: 0.4rem; font-size: 1rem; }
      button { padding: 0.4rem 1rem; cursor: pointer; }
      #status { color: #555; margin-bottom: 0.5rem; min-height: 1.2em; }
      #results li { font-family: monospace; margin: 0.2rem 0; }
      .published-badge { color: #2d9e2d; margin-left: 0.4em; font-size: 0.85em; }
    </style>
    <script src="https://da.live/nx/utils/sdk.js" type="module"></script>
    <script src="./index.js" type="module"></script>
  </head>
  <body>
    <a href="../" class="back">All Tools</a>
    <h2>Block Finder</h2>
    <form id="search-form">
      <input id="block-input" type="text" placeholder="Block name (e.g. hero)" required />
      <button type="submit">Scan</button>
    </form>
    <p id="status"></p>
    <ul id="results"></ul>
    <button id="status-btn" style="display:none">Check Status</button>
  </body>
</html>
