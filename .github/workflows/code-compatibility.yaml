name: Check code compatibility with supported browsers

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            **/node_modules
          key: npm-${{ runner.os }}-20-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci --no-fund --prefer-offline

      - name: Check for unsupported functions
        run: npx eslint --no-eslintrc -c .eslintrc-code-compatibility.js .
