<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="/express/code/scripts/fallback.js" nomodule></script>
<script src="/express/code/scripts/scripts.js" type="module"></script>
<style>body { display: none; }</style>
<link rel="icon" href="data:,">
<script>
  console.log('hello world 3');
  document.addEventListener("DOMContentLoaded", (event) => {
    console.log("DOM fully loaded and parsed");
    document.querySelectorAll('.ax-columns picture img').forEach((img) => {
      const url = new URL(img.src, window.location.href);
      const { pathname } = url;
      const newSrc = `${pathname}?width=400&format=webply&optimize=medium`;
      img.src = newSrc;

      img.parentElement.querySelectorAll('source').forEach((source) => {
        source.srcset = newSrc;
      });

      if (!document.head.querySelector(`link[href="${newSrc}"]`)) {
        const link = document.createElement('link');
        link.rel = 'preload';
        link.fetchPriority = 'high';
        link.as = 'image';
        link.href = newSrc;
        document.head.appendChild(link);
      }
    });
  });
</script>
