<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>base-color test - Simple</title>
  <style>
    body {
      margin: 40px;
      font-family: sans-serif;
    }
    .container {
      border: 2px solid #ccc;
      padding: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Base Color Component Test</h1>

  <div class="container">
    <base-color id="test" color="#FF0000"></base-color>
  </div>

  <div style="margin-top: 20px;">
    <button id="log">Log Component State</button>
  </div>

  <script type="module">
    import './index.js';

    const component = document.querySelector('#test');

    component.addEventListener('color-change', (e) => {
      console.log('Color changed:', e.detail);
    });

    document.querySelector('#log').addEventListener('click', () => {
      console.log('Component:', component);
      console.log('Shadow Root:', component.shadowRoot);
      console.log('sp-color-area:', component.shadowRoot?.querySelector('sp-color-area'));
      console.log('sp-color-slider:', component.shadowRoot?.querySelector('sp-color-slider'));
    });

    // Wait a moment and check if components loaded
    setTimeout(() => {
      const area = component.shadowRoot?.querySelector('sp-color-area');
      const slider = component.shadowRoot?.querySelector('sp-color-slider');
      console.log('After timeout - area:', area, 'slider:', slider);
      if (!area || !slider) {
        console.error('Components not found in shadow DOM!');
      }
    }, 1000);
  </script>
</body>
</html>
