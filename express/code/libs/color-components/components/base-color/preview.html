<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>base-color preview</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: adobe-clean, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: flex-start;
    }
    h2 { margin: 0 0 8px; }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
  </style>
</head>
<body>
  <h2>Desktop - With Header (HEX mode - shows text box)</h2>
  <base-color id="desktop-hex" color="#FF0000" color-mode="HEX"></base-color>

  <h2>Desktop - RGB Mode (no text box)</h2>
  <base-color id="desktop-rgb" color="#00FF00" color-mode="RGB"></base-color>

  <h2>Desktop - HSB Mode (no text box)</h2>
  <base-color id="desktop-hsb" color="#0000FF" color-mode="HSB"></base-color>

  <h2>Desktop - Lab Mode (no text box)</h2>
  <base-color id="desktop-lab" color="#FFFF00" color-mode="Lab"></base-color>

  <h2>Desktop - Without Header</h2>
  <base-color id="desktop-no-header" color="#FF00FF" show-header="false"></base-color>

  <h2>Mobile (bottom sheet)</h2>
  <button id="open-sheet">Open bottom sheet</button>
  <base-color id="mobile" mobile color="#00FFFF"></base-color>

  <script type="module">
    import './index.js';

    // Setup desktop variants
    const desktopHex = document.querySelector('#desktop-hex');
    desktopHex.addEventListener('color-change', (e) => {
      console.log('HEX color-change', e.detail);
    });
    desktopHex.addEventListener('mode-change', (e) => {
      console.log('mode-change', e.detail);
    });

    const desktopRgb = document.querySelector('#desktop-rgb');
    desktopRgb.addEventListener('color-change', (e) => {
      console.log('RGB color-change', e.detail);
    });

    const desktopHsb = document.querySelector('#desktop-hsb');
    desktopHsb.addEventListener('color-change', (e) => {
      console.log('HSB color-change', e.detail);
    });

    const desktopLab = document.querySelector('#desktop-lab');
    desktopLab.addEventListener('color-change', (e) => {
      console.log('Lab color-change', e.detail);
    });

    const desktopNoHeader = document.querySelector('#desktop-no-header');
    desktopNoHeader.addEventListener('color-change', (e) => {
      console.log('No Header color-change', e.detail);
    });

    // Setup mobile
    const mobile = document.querySelector('#mobile');
    mobile.addEventListener('color-change', (e) => {
      console.log('Mobile color-change', e.detail);
    });

    document.querySelector('#open-sheet').addEventListener('click', () => {
      mobile.show();
    });

    mobile.addEventListener('panel-close', () => {
      console.log('bottom sheet closed');
    });
  </script>
</body>
</html>
